name: Referee SW auto-bump

on:
  push:
    branches: [master]
    paths:
      - 'referee/**'

permissions:
  contents: write

jobs:
  bump:
    if: github.event.head_commit.message != null && !contains(github.event.head_commit.message, '[sw-bump]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Bump SW cache key to short SHA
        run: |
          SHA=$(git rev-parse --short HEAD)
          CURRENT=$(grep -oE "fabd-referee-[a-z0-9]+" referee/sw.js | head -1)
          NEW="fabd-referee-${SHA}"
          if [ "$CURRENT" = "$NEW" ]; then
            echo "SW cache already at $CURRENT — nothing to do"
            exit 0
          fi
          sed -i "s/fabd-referee-[a-z0-9]\+/${NEW}/" referee/sw.js
          echo "Bumped: ${CURRENT} → ${NEW}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add referee/sw.js
          git commit -m "chore(referee): auto-bump SW cache → ${SHA} [sw-bump] [skip ci]"
          git push
