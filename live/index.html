<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1E3A8A">
  <title>FABD - Placar Ao Vivo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0F172A;color:#fff;min-height:100vh}
    .header{background:#1E3A8A;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10}
    .header h1{font-size:20px;font-weight:700}
    .header .sub{font-size:12px;color:#93C5FD;margin-top:4px}
    .live-dot{display:inline-block;width:8px;height:8px;background:#EF4444;border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    /* Tabs */
    .tabs{display:flex;justify-content:center;gap:0;background:#1E293B;position:sticky;top:52px;z-index:9}
    .tab{flex:1;max-width:200px;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#94A3B8;transition:all 0.2s}
    .tab.active{color:#fff;border-bottom-color:#F59E0B}

    .container{max-width:800px;margin:0 auto;padding:16px}

    /* Match cards */
    .match-live{background:#1E293B;border-radius:16px;padding:20px;margin-bottom:16px;border:2px solid #334155}
    .match-live.active{border-color:#F59E0B;box-shadow:0 0 20px rgba(245,158,11,0.2)}
    .match-live .top-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .badge-blue{background:#2563EB;color:#fff}
    .badge-green{background:#10B981;color:#fff}
    .badge-gray{background:#334155;color:#94A3B8}
    .scoreboard{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .player{flex:1;text-align:center}
    .player .name{font-size:15px;font-weight:700;margin-bottom:8px;min-height:36px;display:flex;align-items:center;justify-content:center}
    .player .name.winner{color:#10B981}
    .player .points{font-size:52px;font-weight:800;line-height:1}
    .player .sets-won{font-size:13px;color:#F59E0B;font-weight:700;margin-top:4px}
    .vs{font-size:14px;color:#475569;font-weight:700}
    .set-info{text-align:center;margin-top:10px;font-size:13px;color:#94A3B8}
    .set-history{display:flex;justify-content:center;gap:10px;margin-top:8px}
    .set-score{background:#0F172A;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:600}
    .match-meta{display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:11px;color:#64748B;flex-wrap:wrap}

    /* Historico */
    .cat-group{margin-bottom:24px}
    .cat-title{font-size:16px;font-weight:700;color:#F59E0B;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #334155}
    .hist-match{background:#1E293B;border-radius:12px;padding:14px 16px;margin-bottom:8px;border-left:4px solid #10B981}
    .hist-match .hist-players{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .hist-match .hist-name{font-size:14px;font-weight:600;flex:1}
    .hist-match .hist-name.left{text-align:left}
    .hist-match .hist-name.right{text-align:right}
    .hist-match .hist-name.win{color:#10B981}
    .hist-match .hist-score{font-size:16px;font-weight:800;color:#F59E0B;min-width:80px;text-align:center}
    .hist-match .hist-meta{display:flex;gap:12px;margin-top:6px;font-size:11px;color:#64748B;flex-wrap:wrap}

    .empty{text-align:center;padding:60px 20px;color:#64748B}
    .empty .icon{font-size:48px;margin-bottom:12px}
    .refresh-info{text-align:center;font-size:11px;color:#475569;padding:8px}
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="live-dot"></span>Placar Ao Vivo</h1>
    <div class="sub" id="tournament-name">Carregando...</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('live')"><span class="live-dot"></span>Ao Vivo</div>
    <div class="tab" onclick="switchTab('history')">Historico</div>
  </div>
  <div class="container" id="tab-live">
    <div class="empty"><div class="icon">&#127992;</div><h3>Carregando...</h3></div>
  </div>
  <div class="container" id="tab-history" style="display:none">
    <div class="empty"><div class="icon">&#127942;</div><h3>Carregando historico...</h3></div>
  </div>
  <div class="refresh-info">Atualiza automaticamente a cada 3 segundos</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL='https://zwjgjtrmsqtyyjtuotuo.supabase.co';
    const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3amdqdHJtc3F0eXlqdHVvdHVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTYyNjIsImV4cCI6MjA5MDMzMjI2Mn0.c6kE4RMlUOr6-FNCY2X5aeedyEvcmVTUxNVn-kvjYWY';
    const sb=window.supabase?window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY):null;
    let currentTab='live',tournamentId=null;

    function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

    function switchTab(tab){
      currentTab=tab;
      document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='live'?0:1)));
      document.getElementById('tab-live').style.display=tab==='live'?'block':'none';
      document.getElementById('tab-history').style.display=tab==='history'?'block':'none';
      if(tab==='history')loadHistory();
    }

    async function getTournament(){
      const{data}=await sb.from('tournaments').select('id,name').order('updated_at',{ascending:false}).limit(1);
      if(data?.length){tournamentId=data[0].id;document.getElementById('tournament-name').textContent=data[0].name;return data[0];}
      document.getElementById('tournament-name').textContent='';return null;
    }

    // === AO VIVO ===
    async function loadLive(){
      if(!sb)return;
      try{
        const t=await getTournament();
        if(!t){document.getElementById('tab-live').innerHTML='<div class="empty"><div class="icon">&#128580;</div><h3>Nenhum torneio ativo</h3></div>';return;}

        const{data:matches}=await sb.from('live_matches').select('*').eq('tournament_id',t.id).eq('status','Em Quadra').order('court');
        if(!matches?.length){document.getElementById('tab-live').innerHTML='<div class="empty"><div class="icon">&#9203;</div><h3>Nenhum jogo em andamento</h3><p style="color:#64748B">Aguarde o inicio das partidas.</p></div>';return;}

        const ids=matches.map(m=>m.id);
        const{data:scores}=await sb.from('live_scores').select('*').in('match_id',ids);
        const sm={};(scores||[]).forEach(s=>{sm[s.match_id]=s;});

        let h='';
        matches.forEach(m=>{
          const s=sm[m.id];
          const isActive=s&&!s.winner;
          const p1S=s?s.score_p1:0,p2S=s?s.score_p2:0,curSet=s?s.current_set:1;
          const s1=s?.sets_p1||[],s2=s?.sets_p2||[],sw1=s?.sets_won_p1||0,sw2=s?.sets_won_p2||0,w=s?.winner;

          h+=`<div class="match-live${isActive?' active':''}">`;
          h+=`<div class="top-row"><span class="badge badge-blue">${esc(m.court)}</span><span class="badge badge-gray">${esc(m.draw_name)} - ${esc(m.round_name||'')}</span></div>`;
          // Scoreboard com sets no centro
          h+=`<div class="scoreboard">`;
          h+=`<div class="player"><div class="name${w===1?' winner':''}">${esc(m.player1)}</div><div class="points">${p1S}</div>${(sw1||sw2)?`<div class="sets-won">${sw1} sets</div>`:''}</div>`;
          // Centro: sets anteriores + set atual
          h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:70px">`;
          if(s1.length){
            s1.forEach((v,i)=>{
              h+=`<div style="font-size:11px;color:#64748B">Set ${i+1}</div>`;
              h+=`<div class="set-score" style="font-size:15px">${v} : ${s2[i]}</div>`;
            });
          }
          if(!w){h+=`<div style="font-size:11px;color:#F59E0B;font-weight:700;margin-top:4px">Set ${curSet}</div>`;}
          h+=`</div>`;
          h+=`<div class="player"><div class="name${w===2?' winner':''}">${esc(m.player2)}</div><div class="points">${p2S}</div>${(sw1||sw2)?`<div class="sets-won">${sw2} sets</div>`:''}</div>`;
          h+=`</div>`;
          if(w){h+=`<div style="text-align:center;margin-top:8px"><span class="badge badge-green">Finalizada - ${esc(w===1?m.player1:m.player2)} venceu</span></div>`;}
          h+=`</div>`;
        });
        document.getElementById('tab-live').innerHTML=h;
      }catch(e){console.error(e);document.getElementById('tab-live').innerHTML='<div class="empty"><div class="icon">&#9888;</div><h3>Erro de conexao</h3><p style="color:#64748B">Tentando reconectar...</p></div>';}
    }

    // === HISTORICO ===
    async function loadHistory(){
      if(!sb||!tournamentId)return;
      try{
        // Buscar matches finalizadas
        const{data:matches}=await sb.from('live_matches').select('*').eq('tournament_id',tournamentId).eq('status','Finalizada').order('updated_at',{ascending:false});
        if(!matches?.length){document.getElementById('tab-history').innerHTML='<div class="empty"><div class="icon">&#127942;</div><h3>Nenhuma partida finalizada</h3></div>';return;}

        // Buscar scores
        const ids=matches.map(m=>m.id);
        const{data:scores}=await sb.from('live_scores').select('*').in('match_id',ids);
        const sm={};(scores||[]).forEach(s=>{sm[s.match_id]=s;});

        // Agrupar por categoria (draw_name)
        const groups={};
        matches.forEach(m=>{
          if(!groups[m.draw_name])groups[m.draw_name]=[];
          groups[m.draw_name].push(m);
        });

        let h='';
        Object.keys(groups).sort().forEach(cat=>{
          h+=`<div class="cat-group"><div class="cat-title">${esc(cat)}</div>`;
          groups[cat].forEach(m=>{
            const s=sm[m.id];
            const w=s?.winner;
            const finalScore=s?.final_score||'';
            const setsP1=s?.sets_p1||[],setsP2=s?.sets_p2||[];
            const umpire=s?.umpire_name||m.umpire||'';
            // Calcular duracao
            let duration='';
            if(m.created_at&&m.updated_at){
              const diff=Math.floor((new Date(m.updated_at)-new Date(m.created_at))/1000);
              if(diff>0){const mins=Math.floor(diff/60),secs=diff%60;duration=`${mins}min ${String(secs).padStart(2,'0')}s`;}
            }

            h+=`<div class="hist-match">`;
            h+=`<div class="hist-players">`;
            h+=`<div class="hist-name left${w===1?' win':''}">${esc(m.player1)}</div>`;
            // Placar por set - um abaixo do outro
            h+=`<div class="hist-score" style="display:flex;flex-direction:column;align-items:center;gap:2px">`;
            if(setsP1.length){
              setsP1.forEach((v,i)=>{
                h+=`<div style="font-size:10px;color:#64748B">Set ${i+1}</div>`;
                h+=`<div style="font-size:15px;font-weight:700">${v} : ${setsP2[i]}</div>`;
              });
            } else if(finalScore){
              h+=`<div>${esc(finalScore)}</div>`;
            } else {
              h+=`<div>-</div>`;
            }
            h+=`</div>`;
            h+=`<div class="hist-name right${w===2?' win':''}">${esc(m.player2)}</div>`;
            h+=`</div>`;
            h+=`<div class="hist-meta">`;
            h+=`<span>${esc(m.round_name||'R'+m.round)}</span>`;
            if(m.court)h+=`<span>${esc(m.court)}</span>`;
            if(umpire)h+=`<span>Arbitro: ${esc(umpire)}</span>`;
            if(duration)h+=`<span>Duracao: ${duration}</span>`;
            h+=`</div></div>`;
          });
          h+=`</div>`;
        });
        document.getElementById('tab-history').innerHTML=h;
      }catch(e){console.error(e);}
    }

    // Init
    loadLive();
    setInterval(()=>{if(currentTab==='live')loadLive();},3000);
  </script>
</body>
</html>
